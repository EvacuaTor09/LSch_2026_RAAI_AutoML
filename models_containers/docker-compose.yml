x-model-env: &model-env
  DOWNLOAD_MODELS: "True"
  MODELS_CACHE_DIR: /app/models_cache
  DATA_DIR: /app/data
  PYTHONUNBUFFERED: "1"

x-model-service: &model-service
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./models_cache:/app/models_cache
    - ./results:/app/results
    - ./data:/app/data
  restart: unless-stopped
  networks:
    - automl_net

services:
  resnet:
    <<: *model-service
    container_name: automl_resnet
    ports:
      - "8001:8001"
    environment:
      <<: *model-env
      MODEL_NAME: resnet50
      MODEL_TYPE: resnet
      PORT: "8001"
      WEIGHTS_DIR: /app/results/weights/resnet

  vgg:
    <<: *model-service
    container_name: automl_vgg
    ports:
      - "8002:8002"
    environment:
      <<: *model-env
      MODEL_NAME: vgg16
      MODEL_TYPE: vgg
      PORT: "8002"
      WEIGHTS_DIR: /app/results/weights/vgg

  vit:
    <<: *model-service
    container_name: automl_vit
    ports:
      - "8003:8003"
    environment:
      <<: *model-env
      MODEL_NAME: vit_base_patch16_224
      MODEL_TYPE: vit
      PORT: "8003"
      WEIGHTS_DIR: /app/results/weights/vit

networks:
  automl_net:
    name: automl_net
    driver: bridge
