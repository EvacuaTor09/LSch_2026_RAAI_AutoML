x-model-base: &model-base
  build:
    context: ./models_containers
    dockerfile: Dockerfile
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 20s
  networks:
    - automl_net
  environment:
    DOWNLOAD_MODELS: "True"
    MODELS_CACHE_DIR: /app/models_cache
    DATA_DIR: /app/data
    PYTHONUNBUFFERED: "1"
    PORT: "8000"
  volumes:
    - ./models_containers/models_cache:/app/models_cache
    - ./models_containers/results:/app/results
    - ./models_containers/data:/app/data
    - ./backend/storage:/app/storage:ro

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: automl
      POSTGRES_PASSWORD: automl
      POSTGRES_DB: automl
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automl -d automl"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automl_net

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    networks:
      - automl_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      resnet-1:
        condition: service_started
      resnet-2:
        condition: service_started
      resnet-3:
        condition: service_started
      vgg-1:
        condition: service_started
      vgg-2:
        condition: service_started
      vgg-3:
        condition: service_started
      vit-1:
        condition: service_started
      vit-2:
        condition: service_started
      vit-3:
        condition: service_started
    environment:
      HTTP_ADDR: ":8080"
      DATA_DIR: /app/storage
      POSTGRES_DSN: postgres://automl:automl@postgres:5432/automl?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      RESNET_REPLICAS: http://resnet-1:8000,http://resnet-2:8000,http://resnet-3:8000
      VGG_REPLICAS: http://vgg-1:8000,http://vgg-2:8000,http://vgg-3:8000
      VIT_REPLICAS: http://vit-1:8000,http://vit-2:8000,http://vit-3:8000
      TRAIN_EPOCHS: "2"
      BATCH_SIZE: "8"
      IMAGE_SIZE: "224"
      LEARNING_RATE: "0.001"
      MODEL_REQUEST_TIMEOUT: "3h"
      REPLICA_LOCK_TTL_MS: "1800000"
    ports:
      - "8080:8080"
    volumes:
      - ./backend/storage:/app/storage
    networks:
      - automl_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/app/worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
      resnet-1:
        condition: service_healthy
      resnet-2:
        condition: service_healthy
      resnet-3:
        condition: service_healthy
      vgg-1:
        condition: service_healthy
      vgg-2:
        condition: service_healthy
      vgg-3:
        condition: service_healthy
      vit-1:
        condition: service_healthy
      vit-2:
        condition: service_healthy
      vit-3:
        condition: service_healthy
    environment:
      DATA_DIR: /app/storage
      POSTGRES_DSN: postgres://automl:automl@postgres:5432/automl?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      RESNET_REPLICAS: http://resnet-1:8000,http://resnet-2:8000,http://resnet-3:8000
      VGG_REPLICAS: http://vgg-1:8000,http://vgg-2:8000,http://vgg-3:8000
      VIT_REPLICAS: http://vit-1:8000,http://vit-2:8000,http://vit-3:8000
      TRAIN_EPOCHS: "2"
      BATCH_SIZE: "8"
      IMAGE_SIZE: "224"
      LEARNING_RATE: "0.001"
      MODEL_REQUEST_TIMEOUT: "3h"
      REPLICA_LOCK_TTL_MS: "1800000"
    volumes:
      - ./backend/storage:/app/storage
    networks:
      - automl_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:5173"
    networks:
      - automl_net

  resnet-1:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: resnet50
      MODEL_TYPE: resnet
      WEIGHTS_DIR: /app/results/weights/resnet

  resnet-2:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: resnet50
      MODEL_TYPE: resnet
      WEIGHTS_DIR: /app/results/weights/resnet

  resnet-3:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: resnet50
      MODEL_TYPE: resnet
      WEIGHTS_DIR: /app/results/weights/resnet

  vgg-1:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: vgg16
      MODEL_TYPE: vgg
      WEIGHTS_DIR: /app/results/weights/vgg

  vgg-2:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: vgg16
      MODEL_TYPE: vgg
      WEIGHTS_DIR: /app/results/weights/vgg

  vgg-3:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: vgg16
      MODEL_TYPE: vgg
      WEIGHTS_DIR: /app/results/weights/vgg

  vit-1:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: vit_base_patch16_224
      MODEL_TYPE: vit
      WEIGHTS_DIR: /app/results/weights/vit

  vit-2:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: vit_base_patch16_224
      MODEL_TYPE: vit
      WEIGHTS_DIR: /app/results/weights/vit

  vit-3:
    <<: *model-base
    environment:
      DOWNLOAD_MODELS: "True"
      MODELS_CACHE_DIR: /app/models_cache
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
      MODEL_NAME: vit_base_patch16_224
      MODEL_TYPE: vit
      WEIGHTS_DIR: /app/results/weights/vit

networks:
  automl_net:
    name: automl_net
    driver: bridge

volumes:
  postgres_data:
